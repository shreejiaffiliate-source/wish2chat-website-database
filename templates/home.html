{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wish2Chat Backend</title>
    <style>
      :root {
        --primary: #c71464; /* Deep Purple to match your Flutter app */
        --primary-light: #c6417d;
        --bg: #f3f4f6;
        --card-bg: #ffffff;
        --text-main: #1f2937;
        --text-muted: #6b7280;
      }
      
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 100%);
        color: var(--text-main);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      
      .container {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        max-width: 600px;
        width: 90%;
        text-align: center;
      }
      
      .logo-box {
        background: var(--primary);
        color: white;
        width: 80px;
        height: 80px;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        font-weight: bold;
        margin: 0 auto 20px auto;
        box-shadow: 0 4px 15px rgba(103, 58, 183, 0.4);
      }
      
      h1 {
        margin: 0 0 10px 0;
        color: var(--text-main);
        font-size: 28px;
      }
      
      p.status {
        color: #10b981; /* Emerald green */
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 30px;
      }
      
      .status-dot {
        width: 10px;
        height: 10px;
        background: #10b981;
        border-radius: 50%;
        box-shadow: 0 0 10px #10b981;
        animation: pulse 2s infinite;
      }
      
      .btn-container {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-bottom: 30px;
      }
      
      .btn {
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      
      .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 10px rgba(103, 58, 183, 0.3);
      }
      
      .btn-primary:hover {
        background: var(--primary-light);
        transform: translateY(-2px);
      }
      
      .api-list {
        text-align: left;
        background: #f8fafc;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
      }
      
      .api-list h3 {
        margin-top: 0;
        font-size: 16px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      
      .api-item {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #e2e8f0;
        font-size: 14px;
      }
      
      .api-item:last-child {
        border-bottom: none;
      }
      
      .api-name {
        font-weight: 600;
      }
      
      /* ✅ UPDATED: Added link styling for the paths */
      .api-path {
        color: var(--primary);
        font-family: monospace;
        text-decoration: none;
        transition: color 0.2s ease;
      }
      
      .api-path:hover {
        color: var(--primary-light);
        text-decoration: underline;
      }
      
      .logo-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 20px;
      }
      
      @keyframes pulse {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-box">
        <img src="{% static 'images/logo.png' %}" alt="Wish2Chat Logo" class="logo-img" />
      </div>
      <h1>Wish2Chat Server</h1>
      <p class="status">
        <span class="status-dot"></span> API is running smoothly
      </p>

      <div class="btn-container">
        <a href="/admin/" class="btn btn-primary">Open Admin Panel</a>
      </div>

      <div class="api-list">
        <h3>Active Endpoints</h3>
        <div class="api-item">
          <span class="api-name">Master Categories</span>
          <a href="/api/masters/" class="api-path">/api/masters/</a>
        </div>
        <div class="api-item">
          <span class="api-name">Sub Categories</span>
          <a href="/api/sub-categories/" class="api-path">/api/sub-categories/</a>
        </div>
        <div class="api-item">
          <span class="api-name">Content Data</span>
          <a href="/api/contents/" class="api-path">/api/contents/</a>
        </div>
        <div class="api-item">
          <span class="api-name">User Profile</span>
          <a href="/api/profile/" class="api-path">/api/profile/</a>
        </div>
      </div>
    </div>
  </body>
</html>
